name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: uv sync --dev
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Tests
        run: uv run pytest
      # El paso "Mappings al día" (`lfdata map --check`) se retiró: en CI no hay
      # tablas curadas (data/ está en .gitignore), así que pasaba en vacío sin
      # verificar nada. El comando se ejerce end-to-end contra datos sintéticos en
      # la suite (tests/test_mappings.py::test_cli_map_and_check). Vuelve a CI
      # cuando exista un pipeline que deje un snapshot curado que comprobar.
